name: Daily Info Collector

on:
  schedule:
    - cron: '0 22 * * *' # 매일 한국 시간 오전 7시 (UTC 22:00)
  workflow_dispatch: # 깃허브 웹사이트에서 수동으로 실행 버튼을 누를 수 있게 해주는 옵션

permissions:
  contents: write # 스크립트가 새 마크다운 글을 쓰고 커밋할 수 있는 권한 부여

jobs:
  collect-and-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Run Collector Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/collect_script.py

      - name: Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 패시브 파이프라인 자동 콘텐츠 추가 🤖"
          file_pattern: 'src/content/blog/*.md'